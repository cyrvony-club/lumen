openapi: 3.1.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
info:
  title: Optional product data retrieval API (internal / local draft)
  version: 0.2.0
  description: >
    Черновой контракт **опционального** HTTP-слоя для выдачи machine-readable product data
    (**product knowledge package**). MVP ориентирован на статические файлы (`product-truth-model.json`,
    канонические Markdown, `entities.jsonl`, `chunks.jsonl`, `feeds/updates.json`).
    Endpoint'ы здесь — возможное **внутреннее** расширение, mock или локальный контракт, **не часть MVP-обещаний**
    и **не** публичный бренд инструмента подготовки данных.
servers:
  - url: http://localhost:3000
    description: Локальный/mock базовый URL для черновика контракта; не подразумевает обязательной публичной выдачи API в MVP

paths:
  /search:
    get:
      operationId: searchKnowledge
      summary: Поиск по экспортированному корпусу product data
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Поисковый запрос
        - name: type
          in: query
          schema:
            type: string
            description: Тип сущности (enum как в entities.jsonl)
        - name: tag
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Ошибка параметров
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /entities/{id}:
    get:
      operationId: getEntityById
      summary: Сущность по id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "404":
          description: Не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /entities/{id}/related:
    get:
      operationId: getRelatedEntities
      summary: Связанные сущности через relations / граф знания
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Связанные сущности
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelatedEntitiesResponse"

  /updates:
    get:
      operationId: getUpdatesSince
      summary: Манифест изменений для инкрементальной синхронизации потребителя
      parameters:
        - name: since
          in: query
          schema:
            type: string
          description: ISO-8601 timestamp или cursor из предыдущего запроса
      responses:
        "200":
          description: Изменения
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatesResponse"

  /docs/{slug}:
    get:
      operationId: getDocBySlug
      summary: Канонический Markdown-документ пакета (product-overview и др.)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            examples:
              - product-overview
              - use-cases
              - comparison-context
              - faq
              - evidence
      responses:
        "200":
          description: Документ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocPage"
        "404":
          description: Не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /chunks/{chunkId}:
    get:
      operationId: getChunkById
      summary: Отдельный LLM-readable чанк для RAG-ingest/traceability
      parameters:
        - name: chunkId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Чанк
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chunk"
        "404":
          description: Не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  schemas:
    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    BaseMetadata:
      type: object
      required: [id, type, summary, tags, updated_at, version, canonical_url]
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - Product
            - Feature
            - UseCase
            - Audience
            - Category
            - Competitor
            - Claim
            - Evidence
            - FAQ
            - Comparison
        title:
          type: string
        name:
          type: string
        summary:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        version:
          type: string
        canonical_url:
          type: string
          format: uri

    Entity:
      allOf:
        - $ref: "#/components/schemas/BaseMetadata"
        - type: object
          properties:
            relations:
              type: array
              items:
                type: object
                required: [type, target_id]
                properties:
                  type:
                    type: string
                  target_id:
                    type: string

    Chunk:
      type: object
      required: [chunk_id, doc_id, title, text, tags, updated_at]
      properties:
        chunk_id:
          type: string
        doc_id:
          type: string
        title:
          type: string
        summary:
          type: string
        text:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        version:
          type: string
        canonical_url:
          type: string
          format: uri
        entity_ids:
          type: array
          items:
            type: string

    DocPage:
      allOf:
        - $ref: "#/components/schemas/BaseMetadata"
        - type: object
          required: [slug, body]
          properties:
            slug:
              type: string
            body:
              type: string
              description: Содержимое (Markdown канонического документа пакета)

    SearchHit:
      type: object
      required: [id, kind]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [entity, chunk]
        score:
          type: number
        preview:
          type: string

    SearchResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"

    RelatedEntitiesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Entity"

    UpdatesResponse:
      type: object
      required: [generated_at, changes]
      properties:
        generated_at:
          type: string
          format: date-time
        package_id:
          type: string
        package_version:
          type: string
        counts:
          type: object
          additionalProperties:
            type: integer
          description: >-
            Числовые агрегаты уровня пакета, например changed_total, changed_entities, changed_chunks
        changed_entity_ids:
          type: array
          items:
            type: string
        changed_chunk_ids:
          type: array
          items:
            type: string
        changes:
          type: array
          items:
            type: object
            required: [id, type, updated_at]
            properties:
              id:
                type: string
              type:
                type: string
              updated_at:
                type: string
                format: date-time
              canonical_url:
                type: string
                format: uri
