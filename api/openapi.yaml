openapi: 3.1.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
info:
  title: Lumen API
  version: 0.1.0
  description: >
    Контракт Lumen: retrieval (knowledge surface) и generation (брифы, прогоны, артефакты).
servers:
  - url: https://api.lumen.example
    description: Пример базового URL

paths:
  /search:
    get:
      operationId: searchKnowledge
      summary: Поиск по корпусу Lumen
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Поисковый запрос
        - name: type
          in: query
          schema:
            type: string
          description: Фильтр по типу сущности
        - name: tag
          in: query
          schema:
            type: string
          description: Фильтр по тегу
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Ошибка параметров
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /entities/{id}:
    get:
      operationId: getEntityById
      summary: Получить сущность по id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "404":
          description: Не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /entities/{id}/related:
    get:
      operationId: getRelatedEntities
      summary: Связанные сущности
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Список связанных сущностей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelatedEntitiesResponse"

  /updates:
    get:
      operationId: getUpdatesSince
      summary: Инкрементальные обновления
      parameters:
        - name: since
          in: query
          schema:
            type: string
          description: ISO-8601 timestamp или cursor
      responses:
        "200":
          description: Манифест изменений
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatesResponse"

  /docs/{slug}:
    get:
      operationId: getDocBySlug
      summary: Канонический документ по slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Документ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocPage"
        "404":
          description: Не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /faq/{id}:
    get:
      operationId: getFaqById
      summary: Запись FAQ по id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: FAQ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaqEntry"
        "404":
          description: Не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /chunks/{chunkId}:
    get:
      operationId: getChunkById
      summary: Получить чанк
      parameters:
        - name: chunkId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Чанк
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chunk"
        "404":
          description: Не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /briefs:
    post:
      operationId: createContentBrief
      summary: Создать ContentBrief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentBriefCreate"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentBrief"
        "400":
          description: Ошибка запроса
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /generation-runs:
    post:
      operationId: startGenerationRun
      summary: Запустить прогон генерации
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerationRunCreate"
      responses:
        "202":
          description: Принято к исполнению
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationRun"

  /generation-runs/{id}:
    get:
      operationId: getGenerationRun
      summary: Статус прогона генерации
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Текущее состояние
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationRun"
        "404":
          description: Не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /artifacts/{id}:
    get:
      operationId: getArtifact
      summary: Получить GeneratedArtifact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Артефакт
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedArtifact"
        "404":
          description: Не найдено
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /artifacts/{id}/reviews:
    post:
      operationId: createArtifactReview
      summary: Добавить Review к артефакту
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCreate"
      responses:
        "201":
          description: Ревью создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "404":
          description: Артефакт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /artifacts/{id}/revisions:
    post:
      operationId: createArtifactRevision
      summary: Зафиксировать Revision артефакта
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevisionCreate"
      responses:
        "201":
          description: Ревизия создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revision"
        "404":
          description: Артефакт не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  schemas:
    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    BaseMetadata:
      type: object
      required: [id, type, summary, tags, updated_at, version, canonical_url]
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        name:
          type: string
        summary:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        version:
          type: string
        canonical_url:
          type: string
          format: uri

    Entity:
      allOf:
        - $ref: "#/components/schemas/BaseMetadata"
        - type: object
          properties:
            relations:
              type: array
              items:
                type: object
                required: [type, target_id]
                properties:
                  type:
                    type: string
                  target_id:
                    type: string

    Chunk:
      type: object
      required: [chunk_id, doc_id, title, text, tags, updated_at]
      properties:
        chunk_id:
          type: string
        doc_id:
          type: string
        title:
          type: string
        summary:
          type: string
        text:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        version:
          type: string
        canonical_url:
          type: string
          format: uri
        entity_ids:
          type: array
          items:
            type: string

    DocPage:
      allOf:
        - $ref: "#/components/schemas/BaseMetadata"
        - type: object
          required: [slug, body]
          properties:
            slug:
              type: string
            body:
              type: string
              description: Содержимое (например Markdown)

    FaqEntry:
      type: object
      required:
        - id
        - type
        - question
        - answer
        - summary
        - tags
        - updated_at
        - version
        - canonical_url
      properties:
        id:
          type: string
        type:
          type: string
          example: Faq
        question:
          type: string
        answer:
          type: string
        summary:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        version:
          type: string
        canonical_url:
          type: string
          format: uri

    SearchHit:
      type: object
      required: [id, kind]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [entity, chunk]
        score:
          type: number
        preview:
          type: string

    SearchResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"

    RelatedEntitiesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Entity"

    UpdatesResponse:
      type: object
      required: [generated_at, changes]
      properties:
        generated_at:
          type: string
          format: date-time
        changes:
          type: array
          items:
            type: object
            required: [id, type, updated_at]
            properties:
              id:
                type: string
              type:
                type: string
              updated_at:
                type: string
                format: date-time
              canonical_url:
                type: string
                format: uri

    ContentBriefCreate:
      type: object
      required: [project_id, title, objective]
      properties:
        project_id:
          type: string
        title:
          type: string
        objective:
          type: string
        audience_id:
          type: string
        channel_id:
          type: string
        style_guide_id:
          type: string
        tags:
          type: array
          items:
            type: string

    ContentBrief:
      type: object
      required: [id, project_id, title, objective, updated_at, version]
      properties:
        id:
          type: string
        project_id:
          type: string
        title:
          type: string
        objective:
          type: string
        audience_id:
          type: string
        channel_id:
          type: string
        style_guide_id:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        version:
          type: string

    GenerationRunCreate:
      type: object
      required: [brief_id, pipeline_id]
      properties:
        brief_id:
          type: string
        pipeline_id:
          type: string
        dry_run:
          type: boolean
          default: false

    GenerationRun:
      type: object
      required: [id, brief_id, status, updated_at]
      properties:
        id:
          type: string
        brief_id:
          type: string
        pipeline_id:
          type: string
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled]
        artifact_id:
          type: string
          description: Заполняется при успешной генерации
        error:
          type: string
        updated_at:
          type: string
          format: date-time

    GeneratedArtifact:
      type: object
      required: [id, brief_id, status, body, updated_at, version, canonical_url]
      properties:
        id:
          type: string
        brief_id:
          type: string
        pipeline_id:
          type: string
        status:
          type: string
          enum: [draft, generated, reviewed, approved, published, archived]
        body:
          type: string
          description: Сырой текст / markdown
        summary:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
        version:
          type: string
        canonical_url:
          type: string
          format: uri

    ReviewCreate:
      type: object
      required: [agent_role, verdict]
      properties:
        agent_role:
          $ref: "#/components/schemas/AgentRole"
        verdict:
          type: string
          enum: [approve, request_changes, reject]
        comments:
          type: string

    Review:
      type: object
      required: [id, artifact_id, agent_role, verdict, created_at]
      properties:
        id:
          type: string
        artifact_id:
          type: string
        agent_role:
          $ref: "#/components/schemas/AgentRole"
        verdict:
          type: string
        comments:
          type: string
        created_at:
          type: string
          format: date-time

    RevisionCreate:
      type: object
      required: [body, summary]
      properties:
        body:
          type: string
        summary:
          type: string
        based_on_review_id:
          type: string

    Revision:
      type: object
      required: [id, artifact_id, body, created_at, version]
      properties:
        id:
          type: string
        artifact_id:
          type: string
        body:
          type: string
        summary:
          type: string
        created_at:
          type: string
          format: date-time
        version:
          type: string
        based_on_review_id:
          type: string

    AgentRole:
      type: string
      enum: [curator, scout, architect, worker]
